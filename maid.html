<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>女傭每日回報系統</title>

<style>
body {
  font-family: Arial, "Microsoft JhengHei";
  background: #f6f7fb;
  margin: 0;
}

.container {
  max-width: 980px;
  margin: auto;
  padding: 20px;
}

.card {
  background: white;
  padding: 16px;
  margin-bottom: 14px;
  border-radius: 12px;
}

.task-row {
  display: grid;
  grid-template-columns: 1fr 120px 140px;
  gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid #eee;
}

.task-btn {
  padding: 10px;
  border-radius: 8px;
  border: none;
  font-weight: bold;
}

.btn-pending {
  background: #bbb;
  color: white;
}

.btn-open {
  background: #f3c742;
}

.btn-done {
  background: #28a745;
  color: white;
}

.version-badge {
  position: fixed;
  bottom: 10px;
  right: 10px;
  background: #2d6cdf;
  color: white;
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 12px;
}
</style>
</head>

<body>
<div class="container">

<h1>女傭每日回報</h1>

<div class="card">
<div id="taskList"></div>
</div>

<div class="card">
<h3>今日摘要</h3>
<textarea id="dailyDesc" style="width:100%"></textarea>
<br><br>
<button onclick="saveDesc()">儲存</button>
</div>

<div class="card">
<h3>摘要列表</h3>
<div id="summary"></div>
</div>

</div>

<div class="version-badge" id="appVersionLabel"></div>

<script>

/*******************
 VERSION CONTROL
*******************/
const APP_VERSION = "v2";  // ⭐改這裡即可清cookie
const VERSION_COOKIE = "maidAppVersion";

/*******************
 CONFIG
*******************/
const COOKIE_NAME = "maidData";
const EXPIRE = 365;

const TASKS = [

{ id: 1, name: "整理客廳", start: "08:00", end: "09:00" },
{ id: 2, name: "打掃臥室", start: "09:00", end: "10:00" },
{ id: 3, name: "清潔浴室", start: "10:00", end: "11:00" },
{ id: 4, name: "整理隨身碟", start: "13:00", end: "23:59" },
{ id: 5, name: "喝咖啡", start: "13:00", end: "18:00" },
{ id: 6, name: "遛狗", start: "14:00", end: "23:59" },
{ id: 7, name: "晚餐備料", start: "17:00", end: "23:59" },
{ id: 8, name: "整理床鋪", start: "21:00", end: "23:59" }

];

/*******************
 COOKIE
*******************/
function setCookie(name,value,days){
let d=new Date();
d.setTime(d.getTime()+days*86400000);
document.cookie=name+"="+encodeURIComponent(value)+";expires="+d.toUTCString()+";path=/";
}

function getCookie(name){
let n=name+"=";
let arr=document.cookie.split(";");
for(let c of arr){
c=c.trim();
if(c.indexOf(n)==0) return decodeURIComponent(c.substring(n.length));
}
return null;
}

function clearCookie(name){
document.cookie=name+"=;expires=Thu, 01 Jan 1970 00:00:00 UTC;path=/;";
}

/*******************
 VERSION CHECK
*******************/
function checkVersion(){
let v=getCookie(VERSION_COOKIE);
if(v!==APP_VERSION){
clearCookie(COOKIE_NAME);
setCookie(VERSION_COOKIE,APP_VERSION,EXPIRE);
alert("系統更新，已清除舊資料");
}
}

/*******************
 TIME
*******************/
function nowHHMM(){
let d=new Date();
return d.getHours()*60+d.getMinutes();
}

function toMin(t){
let [h,m]=t.split(":");
return Number(h)*60+Number(m);
}

/*******************
 DATA
*******************/
function load(){
let d=getCookie(COOKIE_NAME);
return d?JSON.parse(d):{};
}

function save(d){
setCookie(COOKIE_NAME,JSON.stringify(d),EXPIRE);
}

function today(){
let d=new Date();
return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();
}

/*******************
 CORE
*******************/
function markDone(id){
let data=load();
let t=today();

if(!data[t]) return;

let now=nowHHMM();
let task=TASKS.find(x=>x.id==id);

if(data[t][id]?.done) return;

if(now<toMin(task.start)||now>toMin(task.end)){
alert("不在時間內");
return;
}

data[t][id]={done:true,time:new Date().toLocaleTimeString()};
save(data);
render();
}

/*******************
 RENDER
*******************/
function render(){

let data=load();
let t=today();

if(!data[t]){
data[t]={};
TASKS.forEach(x=>data[t][x.id]={done:false});
save(data);
}

let html="";

TASKS.forEach(task=>{
let state=data[t][task.id];
let now=nowHHMM();

let text="未完成";
let cls="btn-pending";
let disabled=true;

if(state.done){
text="已完成";
cls="btn-done";
}
else if(now>=toMin(task.start)&&now<=toMin(task.end)){
text="完成";
cls="btn-open";
disabled=false;
}

html+=`
<div class="task-row">
<div>${task.name}<br>${task.start}-${task.end}</div>
<div>
<button class="task-btn ${cls}" ${disabled?"disabled":""}
onclick="markDone(${task.id})">${text}</button>
</div>
</div>`;
});

document.getElementById("taskList").innerHTML=html;

renderSummary();
}

/*******************
 SUMMARY
*******************/
function saveDesc(){
let data=load();
let t=today();
if(!data[t]) data[t]={};

data[t].desc=document.getElementById("dailyDesc").value;
save(data);
renderSummary();
}

function renderSummary(){
let data=load();
let keys=Object.keys(data).reverse();

let html="";

keys.forEach(k=>{
let d=data[k];
html+=`<div class="card">
<b>${k}</b><br>
${d.desc||""}
</div>`;
});

document.getElementById("summary").innerHTML=html;
}

/*******************
 INIT
*******************/
checkVersion();

document.getElementById("appVersionLabel").innerText="v"+APP_VERSION;

render();

</script>
</body>
</html>
